name: FullRegression

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:

      branch_tests:
        description: 'Choose site branch'
        required: true
        type: string
        default: 'main'

      launch_mobile_tests:
        description: 'Do You want to run mobile browser and native tests?'
        required: true
        type: choice
        options:
          - Yes
          - No
        default: Yes

jobs:
  list-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tags: ${{ steps.set-matrix.outputs.tags }}
    steps:
      - name: Fetch image tags
        id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tags=$(gh api --paginate "/orgs/TestlumFramework/packages/container/testlum/versions?per_page=100" --jq '.[].metadata.container.tags[]' | sort -V | uniq)
          if [ -z "$tags" ]; then
            echo "No tags found in registry."
            exit 1
          fi
          tags_json=$(printf '%s\n' $tags | jq -R -s -c 'split("\n")[:-1]')
          echo "tags=$tags_json" >> "$GITHUB_OUTPUT"

  run-tests:
    needs: list-tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.list-tags.outputs.tags) }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Checkout Testlum DEMO
        uses: actions/checkout@v4
        with:
          repository: TestlumFramework/Demo
          ref: ${{ inputs.branch_tests || 'main' }}
          ssh-key: ${{ secrets.SSH_ACCESS }}
          path: testlum-tests

      - name: Create Docker Network
        run: docker network create e2e_network

      - name: Start BrowserStackLocal
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-identifier: random
        env:
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_KEY }}

      - name: Run Integrations
        working-directory: testlum-tests
        run: |
          docker compose -f docker/docker-compose-integrations.yaml --profile ci up -d --force-recreate
          docker exec -t vault-e2e sh /tmp/init_vault.sh

      - name: Run Selenium Grid Browsers
        working-directory: testlum-tests
        run: |
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci up -d --force-recreate

      - name: Run Mega Test App
        working-directory: testlum-tests
        run: docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci up -d --build --force-recreate

      - name: Install xmlstarlet
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Pull Testlum Image
        working-directory: testlum-tests
        run: |
          docker pull ghcr.io/testlumframework/testlum:${{ matrix.image }}
          docker tag ghcr.io/testlumframework/testlum:${{ matrix.image }} testlum:${{ matrix.image }}

      - name: Run Regression (General)
        uses: ./.github/actions/run-testlum
        with:
          image_tag: ${{ matrix.image }}
          config_file: config-ci-regression.xml
          resources_path: testlum-tests/REGRESSION

      - name: Run Regression (Mobile and Native)
        if: ${{ inputs.launch_mobile_tests == 'Yes' }}
        uses: ./.github/actions/run-testlum
        with:
          image_tag: ${{ matrix.image }}
          config_file: config-ci-regression-mobile.xml
          resources_path: testlum-tests/REGRESSION

      - name: Post Actions
        working-directory: testlum-tests
        if: always()
        run: |
          docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci down -v --timeout 10 || true
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci down -v --timeout 10 || true
          docker compose -f docker/docker-compose-integrations.yaml --profile ci down -v --timeout 10 || true
          docker system prune -af --volumes || true

      - name: Stop BrowserStackLocal
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop
        env:
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_KEY }}

      - name: Build Tag Badge
        if: always()
        id: badge
        run: |
          tag="${{ matrix.image }}"
          safe_tag=$(echo "$tag" | sed 's/[^a-zA-Z0-9._-]/_/g')

          status="${{ job.status }}"
          message="passing"
          color="green"
          if [ "$status" != "success" ]; then
            message="failed"
            color="red"
          fi

          mkdir -p badges
          cat > "badges/${safe_tag}.json" <<EOF
          {"schemaVersion":1,"label":"testlum:${tag}","message":"${message}","color":"${color}"}
          EOF

          echo "safe_tag=$safe_tag" >> "$GITHUB_OUTPUT"

      - name: Upload Tag Badge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ steps.badge.outputs.safe_tag }}
          path: badges/*.json

      # - name: Slack Notification Success
      #   if: success()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     channel-id: '#jenkins-notification'
      #     slack-message: "✔️ GITHUB | SUCCESS: ${{ github.workflow }} #${{ github.run_number }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔎 Open Build>"
      #   env:
      #     SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  update-badges:
    runs-on: ubuntu-latest
    needs: [list-tags, run-tests]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download badge artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: badge-*
          path: badge-artifacts
          merge-multiple: true

      - name: Update badges and README
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p badges
          cp badge-artifacts/*.json badges/ 2>/dev/null || true

          python - <<'PY'
          import json
          import os
          import re
          from glob import glob

          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]

          badge_files = sorted(glob("badges/*.json"))
          lines = []
          for path in badge_files:
            with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
            label = data.get("label", os.path.splitext(os.path.basename(path))[0])
            url = f"https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/{repo}/{branch}/{path}"
            lines.append(f"![{label}]({url})")

          content = " ".join(lines) if lines else "_No tag results yet._"

          with open("README.md", "r", encoding="utf-8") as f:
            readme = f.read()

          pattern = r"<!-- BADGES:START -->(.*?)<!-- BADGES:END -->"
          replacement = f"<!-- BADGES:START -->\n{content}\n<!-- BADGES:END -->"
          updated = re.sub(pattern, replacement, readme, flags=re.S)

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(updated)
          PY

      - name: Commit and push updated badges
        run: |
          if git diff --quiet; then
            echo "No badge updates to commit."
            exit 0
          fi

          git config user.name "Testlum Regression"
          git config user.email "testlum-regression[bot]@users.noreply.github.com"
          git add README.md badges
          git commit -m "Update testlum tag badges"
          git push

      # - name: Slack Notification Failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     channel-id: '#jenkins-notification'
      #     slack-message: "✖️ GITHUB | FAILED: ${{ github.workflow }} #${{ github.run_number }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔎 Open Build>"
      #   env:
      #     SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
