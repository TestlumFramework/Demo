name: FullRegression

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs: {}

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Build matrix from config
        id: build
        run: |
          matrix=$(jq -c '{include: [ .entries[] as $entry | .arches[] as $arch | select(($arch.enabled // true) == true) | ($entry + $arch) ]}' .github/regression-matrix.json)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  run-tests:
    name: ${{ matrix.image }} on ${{ matrix.runs_on }} from ${{ matrix.tests_branch }} branch
    needs: prepare-matrix
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Checkout Testlum DEMO
        uses: actions/checkout@v4
        with:
          repository: TestlumFramework/Demo
          ref: ${{ matrix.tests_branch }}
          ssh-key: ${{ secrets.SSH_ACCESS }}
          path: testlum-tests

      - name: Setup Test Environment (Linux)
        if: ${{ matrix.os_family == 'linux' }}
        id: setup_env_linux
        uses: ./.github/actions/setup-test-env
        with:
          working_directory: testlum-tests
          browserstack_access_key: ${{ secrets.BROWSERSTACK_KEY }}
          browserstack_local_identifier: GitHubAction-${{ github.run_id }}-${{ matrix.arch }}
          browserstack_binary_arch: ${{ matrix.arch }}
          enable_browserstack: true

      - name: Install xmlstarlet
        if: ${{ matrix.os_family == 'linux' }}
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Pull Testlum Image (Linux)
        if: ${{ matrix.os_family == 'linux' }}
        id: pull_image_linux
        working-directory: testlum-tests
        run: |
          docker pull --platform linux/${{ matrix.arch }} ghcr.io/testlumframework/testlum:${{ matrix.image }}
          docker tag ghcr.io/testlumframework/testlum:${{ matrix.image }} testlum:${{ matrix.image }}

      - name: Run Regression (Linux)
        if: ${{ matrix.os_family == 'linux' }}
        id: run_regression_linux
        uses: ./.github/actions/run-testlum
        with:
          image_tag: ${{ matrix.image }}
          config_file: ${{ matrix.config_file }}
          resources_path: testlum-tests/REGRESSION

      - name: Run Regression (Mobile and Native Linux)
        id: run_regression_mobile_linux
        if: ${{ matrix.os_family == 'linux' && matrix.run_mobile_tests }}
        uses: ./.github/actions/run-testlum
        with:
          image_tag: ${{ matrix.image }}
          config_file: ${{ matrix.mobile_config_file }}
          resources_path: testlum-tests/REGRESSION

      - name: Cleanup Test Environment (Linux)
        if: ${{ always() && matrix.os_family == 'linux' }}
        uses: ./.github/actions/cleanup-test-env
        with:
          working_directory: testlum-tests
          browserstack_access_key: ${{ secrets.BROWSERSTACK_KEY }}
          browserstack_local_identifier: GitHubAction-${{ github.run_id }}-${{ matrix.arch }}
          browserstack_binary_arch: ${{ matrix.arch }}
          enable_browserstack: true

      - name: Build Matrix Result (Linux)
        if: ${{ always() && matrix.os_family == 'linux' }}
        run: |
          safe_tag=$(echo "${{ matrix.image }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          setup_outcome="${{ steps.setup_env_linux.outcome }}"
          pull_outcome="${{ steps.pull_image_linux.outcome }}"
          regression_outcome="${{ steps.run_regression_linux.outcome }}"
          mobile_outcome="${{ steps.run_regression_mobile_linux.outcome }}"

          status="passed"
          if [ "${setup_outcome}" = "failure" ] || [ "${pull_outcome}" = "failure" ] || [ "${regression_outcome}" = "failure" ]; then
            status="failed"
          fi
          if [ "${{ matrix.run_mobile_tests }}" = "true" ] && [ "${mobile_outcome}" = "failure" ]; then
            status="failed"
          fi
          if [ "${setup_outcome}" = "cancelled" ] || [ "${pull_outcome}" = "cancelled" ] || [ "${regression_outcome}" = "cancelled" ] || [ "${mobile_outcome}" = "cancelled" ]; then
            status="cancelled"
          fi

          run_date="$(date -u +%Y/%m/%d)"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          mkdir -p results
          cat > "results/${safe_tag}-${{ matrix.os_family }}-${{ matrix.arch }}.json" <<EOF
          {"image":"${{ matrix.image }}","tests_branch":"${{ matrix.tests_branch }}","config_file":"${{ matrix.config_file }}","mobile_config_file":"${{ matrix.mobile_config_file }}","run_mobile_tests":"${{ matrix.run_mobile_tests }}","os_family":"${{ matrix.os_family }}","arch":"${{ matrix.arch }}","status":"${status}","run_date":"${run_date}","run_url":"${run_url}"}
          EOF

      - name: Upload Matrix Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.image }}-${{ matrix.os_family }}-${{ matrix.arch }}
          path: results/*.json

  update-readme:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: result-artifacts
          merge-multiple: true

      - name: Download GHCR version metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p results
          gh api --paginate "/orgs/TestlumFramework/packages/container/testlum/versions?per_page=100" > results/ghcr_versions.json

      - name: Update README matrix table
        run: |
          mkdir -p results
          cp result-artifacts/*.json results/ 2>/dev/null || true

          python - <<'PY'
          import json
          import re
          from glob import glob

          def fmt_status(status, url):
            normalized = (status or "not run").strip().lower()
            labels = {
              "passed": "✅",
              "failed": "❌",
              "cancelled": "⏹",
              "not run": "➖",
            }
            text = labels.get(normalized, "➖")
            if url and normalized != "not run":
              return f"[{text}]({url})"
            return text

          with open("results/ghcr_versions.json", "r", encoding="utf-8") as f:
            versions = json.load(f)

          published_by_tag = {}
          for version in versions:
            published = (version.get("created_at") or "")[:10].replace("-", "/")
            tags = version.get("metadata", {}).get("container", {}).get("tags", [])
            for tag in tags:
              if tag not in published_by_tag:
                published_by_tag[tag] = published

          rows = {}
          for path in sorted(glob("results/*.json")):
            if "ghcr_versions.json" in path:
              continue
            with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

            if data.get("os_family") != "linux":
              continue

            key = data["image"]
            item = rows.setdefault(
              key,
              {
                "image": key,
                "linux_amd64_status": "not run",
                "linux_amd64_url": "",
                "linux_arm64_status": "not run",
                "linux_arm64_url": "",
                "tests_branch": data["tests_branch"],
                "run_mobile_tests": data.get("run_mobile_tests", "false"),
                "last_updated": published_by_tag.get(key, data.get("run_date", "N/A")),
              },
            )

            if data["arch"] == "amd64":
              item["linux_amd64_status"] = data["status"]
              item["linux_amd64_url"] = data.get("run_url", "")
            if data["arch"] == "arm64":
              item["linux_arm64_status"] = data["status"]
              item["linux_arm64_url"] = data.get("run_url", "")

            item["tests_branch"] = data["tests_branch"]
            item["run_mobile_tests"] = data.get("run_mobile_tests", "false")
            item["last_updated"] = published_by_tag.get(key, data.get("run_date", "N/A"))

          ordered = sorted(rows.values(), key=lambda x: (x["image"] != "latest", x["image"]))

          table_lines = [
            "| Image | Linux `amd64` | Linux `arm64` | Branch | Last Updated | Mobile Tests |",
            "|---|---|---|---|---|---|",
          ]

          for row in ordered:
            image_link = f"[`{row['image']}`](https://github.com/orgs/TestlumFramework/packages/container/package/testlum)"
            branch_link = f"[`{row['tests_branch']}`](https://github.com/TestlumFramework/Demo/tree/{row['tests_branch']})"
            mobile_text = "✅" if str(row["run_mobile_tests"]).lower() == "true" else "➖"
            table_lines.append(
              f'| {image_link} | {fmt_status(row["linux_amd64_status"], row["linux_amd64_url"])} | {fmt_status(row["linux_arm64_status"], row["linux_arm64_url"])} | {branch_link} | {row["last_updated"]} | {mobile_text} |'
            )

          content = "\n".join(table_lines)

          with open("README.md", "r", encoding="utf-8") as f:
            readme = f.read()

          pattern = r"<!-- RESULTS-TABLE:START -->(.*?)<!-- RESULTS-TABLE:END -->"
          replacement = f"<!-- RESULTS-TABLE:START -->\n{content}\n<!-- RESULTS-TABLE:END -->"
          updated = re.sub(pattern, replacement, readme, flags=re.S)

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(updated)
          PY

      - name: Commit and push README
        run: |
          if git diff --quiet; then
            echo "No README updates to commit."
            exit 0
          fi

          git config user.name "Testlum Regression"
          git config user.email "testlum-regression[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update regression matrix status table"
          git push
