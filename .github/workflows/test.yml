name: FullRegression

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Choose branch'
        required: true
        type: string
        default: 'main'

      branch_site:
        description: 'Choose site branch'
        required: true
        type: string
        default: 'main'

      image:
        description: 'Choose image version'
        required: true
        type: choice
        options:
          - latest
          - 1.0.2
        default: latest

      mobile:
        description: 'Do You want to run mobile browser and native tests?'
        required: true
        type: choice
        options:
          - Yes
          - No
        default: Yes

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Testlum Tool
        uses: actions/checkout@v4
        with:
          repository: TestlumFramework/Testlum
          ref: ${{ inputs.branch }}
          ssh-key: ${{ secrets.SSH_ACCESS }}
          path: tool

      - name: Checkout Testlum Site
        uses: actions/checkout@v4
        with:
          repository: TestlumFramework/Demo
          ref: ${{ inputs.branch_site }}
          ssh-key: ${{ secrets.SSH_ACCESS }}
          path: site

      - name: Create Docker Network
        run: docker network create e2e_network

      - name: File Structure
        run: |
          pwd
          tree -L 4

      - name: Start BrowserStackLocal
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-identifier: random
        env:
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_KEY }}

      - name: Run Integrations
        working-directory: site
        run: |
          docker compose -f docker/docker-compose-integrations.yaml --profile ci up -d --force-recreate
          docker exec -t vault-e2e sh /tmp/init_vault.sh

      - name: Run Selenium Grid Browsers
        working-directory: site
        run: |
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci up -d --force-recreate
          sleep 30
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci logs -t || true

      - name: Run Mega Test App
        working-directory: site
        run: docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci up -d --build --force-recreate

      - name: Install xmlstarlet
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      - name: Image TESTLUM
        working-directory: tool
        run: |
          docker rmi testlum:${{ inputs.image }} || true
          docker pull ghcr.io/testlumframework/testlum:${{ inputs.image }}
          docker tag ghcr.io/testlumframework/testlum:${{ inputs.image }} testlum:${{ inputs.image }}

      - name: Run Regression (General)
        working-directory: tool
        run: |
          CI_CONFIG="config-ci-regression.xml"
          PATH_TO_RESOURCES="site/REGRESSION"
          VERSION="${{ inputs.image }}"
          MOUNT_DIR="${{ github.workspace }}/${PATH_TO_RESOURCES}"
          RESOURCES_DIR_INSIDE_CONTAINER="/REGRESSION/resources"

          echo "CI CONFIG: ${CI_CONFIG}"
          echo "PATH TO RESOURCES: ${PATH_TO_RESOURCES}"
          echo "Version: ${VERSION}"
          echo "MOUNT DIR: ${MOUNT_DIR}"
          echo "Testlum version: ${VERSION}"

          COMMAND="testlum:${VERSION} -c=${CI_CONFIG} -p=${RESOURCES_DIR_INSIDE_CONTAINER}"
          echo "Testlum command: ${COMMAND}"

          docker run -t -u $(id -u):$(id -g) --rm \
            --network=e2e_network \
            -v ${MOUNT_DIR}:/REGRESSION \
            ${COMMAND}

          EXIT_CODE=$?
          echo "Regression finished with exit code ${EXIT_CODE}"
          sleep 5

          if [ $EXIT_CODE -eq 0 ]; then
            echo "BUILD STATUS [SUCCESS]"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "BUILD STATUS [FAILURE] - Tests failed"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "BUILD STATUS [FAILURE] - No tests found"
            exit 1
          else
            echo "BUILD STATUS [FAILURE] - Invalid configuration or crash (Code: ${EXIT_CODE})"
            exit 1
          fi

      - name: Run Regression Mobile
        if: ${{ inputs.mobile == 'Yes' }}
        working-directory: tool
        run: |
          CI_CONFIG="config-ci-regression-mobile.xml"
          PATH_TO_RESOURCES="site/REGRESSION"
          VERSION="${{ inputs.image }}"
          MOUNT_DIR="${{ github.workspace }}/${PATH_TO_RESOURCES}"
          RESOURCES_DIR_INSIDE_CONTAINER="/REGRESSION/resources"

          echo "CI CONFIG: ${CI_CONFIG}"
          echo "PATH TO RESOURCES: ${PATH_TO_RESOURCES}"
          echo "Version: ${VERSION}"
          echo "MOUNT DIR: ${MOUNT_DIR}"
          echo "Testlum version: ${VERSION}"

          COMMAND="testlum:${VERSION} -c=${CI_CONFIG} -p=${RESOURCES_DIR_INSIDE_CONTAINER}"
          echo "Testlum command: ${COMMAND}"

          docker run -t -u $(id -u):$(id -g) --rm \
            --network=e2e_network \
            -v ${MOUNT_DIR}:/REGRESSION \
            ${COMMAND}

          EXIT_CODE=$?
          echo "Regression finished with exit code ${EXIT_CODE}"
          sleep 5

          if [ $EXIT_CODE -eq 0 ]; then
            echo "BUILD STATUS [SUCCESS]"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "BUILD STATUS [FAILURE] - Tests failed"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "BUILD STATUS [FAILURE] - No tests found"
            exit 1
          else
            echo "BUILD STATUS [FAILURE] - Invalid configuration or crash (Code: ${EXIT_CODE})"
            exit 1
          fi

      - name: Post Actions
        working-directory: site
        if: always()
        run: |
          echo "Post actions"
          docker ps

          docker compose -f docker/docker-compose-integrations.yaml --profile ci logs -t --tail=400 || true
          docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci logs -t || true
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci logs -t --tail=400 || true

          docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci down -v --timeout 10 || true
          docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci down -v --timeout 10 || true
          docker compose -f docker/docker-compose-integrations.yaml --profile ci down -v --timeout 10 || true

          docker rm -f -v $(docker ps -q) || true
          docker rmi -f $(docker images -f "dangling=true" -q) || true
          docker volume ls -qf "dangling=true" | xargs docker volume rm || true
          docker network rm e2e_network || true

          docker ps -a
          docker ps
          docker image ls
          docker volume ls
          docker network ls

      - name: Stop BrowserStackLocal
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop
        env:
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_KEY }}

