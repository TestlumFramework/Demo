name: Setup Test Environment Windows
description: Creates Docker network, starts BrowserStackLocal, and starts integration services on Windows runners.

inputs:
  working_directory:
    description: Directory that contains the docker compose files.
    required: false
    default: testlum-tests
  browserstack_access_key:
    description: BrowserStack access key for local testing.
    required: true
  browserstack_local_identifier:
    description: BrowserStack local identifier.
    required: false
    default: random
  enable_browserstack:
    description: Whether BrowserStackLocal should be started.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Create Docker Network
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        try {
          docker version | Out-Null
        } catch {
          Write-Error "Docker CLI is not available on this Windows runner."
          throw
        }

        docker network inspect e2e_network *> $null
        if ($LASTEXITCODE -ne 0) {
          try {
            docker network create --driver nat e2e_network | Out-Null
          } catch {
            Write-Error "Failed to create Docker network with NAT driver. This usually means the runner Docker mode is incompatible with this stack."
            throw
          }
        } else {
          Write-Host "Docker network e2e_network already exists."
        }

    - name: Start BrowserStackLocal
      if: ${{ inputs.enable_browserstack == 'true' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $bsDir = Join-Path "${{ github.workspace }}" ".browserstack-local"
        New-Item -ItemType Directory -Force -Path $bsDir | Out-Null

        $zipPath = Join-Path $bsDir "BrowserStackLocal.zip"
        Invoke-WebRequest -Uri "https://www.browserstack.com/browserstack-local/BrowserStackLocal-win32.zip" -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $bsDir -Force

        $identifier = "${{ inputs.browserstack_local_identifier }}"
        if ($identifier -eq "random") {
          $identifier = "GitHubAction-$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())-$([System.Guid]::NewGuid().ToString('N').Substring(0,8))"
        }

        Add-Content -Path $env:GITHUB_ENV -Value "BROWSERSTACK_LOCAL=true"
        Add-Content -Path $env:GITHUB_ENV -Value "BROWSERSTACK_LOCAL_IDENTIFIER=$identifier"

        $exe = Join-Path $bsDir "BrowserStackLocal.exe"
        & $exe --key "${{ inputs.browserstack_access_key }}" --only-automate --ci-plugin GitHubAction --local-identifier "$identifier" --daemon start

    - name: Run Integrations
      shell: pwsh
      working-directory: ${{ inputs.working_directory }}
      run: |
        docker compose -f docker/docker-compose-integrations.yaml --profile ci up -d --force-recreate
        docker exec -t vault-e2e sh /tmp/init_vault.sh

    - name: Run Selenium Grid Browsers
      shell: pwsh
      working-directory: ${{ inputs.working_directory }}
      run: docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci up -d --force-recreate

    - name: Run Mega Test App
      shell: pwsh
      working-directory: ${{ inputs.working_directory }}
      run: docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci up -d --build --force-recreate
