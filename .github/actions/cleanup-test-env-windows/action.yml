name: Cleanup Test Environment Windows
description: Stops services and BrowserStackLocal and prunes Docker resources on Windows runners.

inputs:
  working_directory:
    description: Directory that contains the docker compose files.
    required: false
    default: testlum-tests
  browserstack_access_key:
    description: BrowserStack access key for local testing.
    required: true
  browserstack_local_identifier:
    description: BrowserStack local identifier.
    required: false
    default: random
  enable_browserstack:
    description: Whether BrowserStackLocal should be stopped.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Shutdown Docker Compose Services
      shell: pwsh
      working-directory: ${{ inputs.working_directory }}
      run: |
        docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci down -v --timeout 10
        docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci down -v --timeout 10
        docker compose -f docker/docker-compose-integrations.yaml --profile ci down -v --timeout 10
      continue-on-error: true

    - name: Prune Docker Resources
      shell: pwsh
      run: docker system prune -af --volumes
      continue-on-error: true

    - name: Stop BrowserStackLocal
      if: ${{ inputs.enable_browserstack == 'true' }}
      shell: pwsh
      run: |
        $ErrorActionPreference = "Continue"
        $bsDir = Join-Path "${{ github.workspace }}" ".browserstack-local"
        $exe = Join-Path $bsDir "BrowserStackLocal.exe"
        if (Test-Path $exe) {
          & $exe --key "${{ inputs.browserstack_access_key }}" --local-identifier "${{ inputs.browserstack_local_identifier }}" --daemon stop
        }
