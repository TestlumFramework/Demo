name: Run Testlum Regression
description: Runs tests from DEMO repository using Testlum docker image

inputs:

  image_tag:
    description: Testlum image tag to execute.
    required: true

  config_file:
    description: Config file passed to Testlum.
    required: true

  resources_path:
    description: Path to the mounted regression resources directory.
    required: false
    default: testlum-tests/REGRESSION

runs:
  using: composite
  steps:
    - name: Launch Tests
      shell: bash
      run: |
        RESOURCES_DIR="/REGRESSION/resources"
        MOUNT_DIR="${{ github.workspace }}/${{ inputs.resources_path }}"
        IMAGE="ghcr.io/testlumframework/testlum:${{ inputs.image_tag }}"

        echo "Running Testlum image: ${IMAGE}"
        echo "Using config: ${{ inputs.config_file }}"
        echo "Using resources: ${MOUNT_DIR}"

        set +e
        docker run -t -u "$(id -u):$(id -g)" --rm \
          --network=e2e_network \
          -v "${MOUNT_DIR}:/REGRESSION" \
          "${IMAGE}" -c="${{ inputs.config_file }}" -p="${RESOURCES_DIR}"
        EXIT_CODE=$?
        set -e

        echo "Regression finished with exit code ${EXIT_CODE}"

        case "${EXIT_CODE}" in
          0)
            echo "BUILD STATUS [SUCCESS]"
            ;;
          1)
            echo "BUILD STATUS [FAILURE] - Tests failed"
            exit 1
            ;;
          2)
            echo "BUILD STATUS [FAILURE] - No tests found"
            exit 1
            ;;
          *)
            echo "BUILD STATUS [FAILURE] - Invalid configuration or crash (Code: ${EXIT_CODE})"
            exit 1
            ;;
        esac
