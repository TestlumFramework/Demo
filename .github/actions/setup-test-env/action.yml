name: Setup Test Environment
description: Creates the Docker network and starts all services required for regression runs.

inputs:

  working_directory:
    description: Directory that contains the docker compose files.
    required: false
    default: testlum-tests

  browserstack_access_key:
    description: BrowserStack access key for local testing.
    required: true

  browserstack_local_identifier:
    description: BrowserStack local identifier.
    required: false
    default: random

  browserstack_local_tunnel_name:
    description: BrowserStack local tunnel name for SDK/capability usage.
    required: false
    default: TestlumTunnel

  browserstack_binary_arch:
    description: BrowserStack binary architecture (`amd64` or `arm64`).
    required: false
    default: amd64

  enable_browserstack:
    description: Whether BrowserStackLocal should be started.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Create Docker Network
      shell: bash
      run: docker network create e2e_network

    - name: Start BrowserStackLocal
      if: ${{ inputs.enable_browserstack == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ inputs.browserstack_binary_arch }}" = "arm64" ]; then
          archive_url="https://www.browserstack.com/browserstack-local/BrowserStackLocal-linux-arm64.zip"
        else
          archive_url="https://www.browserstack.com/browserstack-local/BrowserStackLocal-linux-x64.zip"
        fi

        bs_dir="${{ github.workspace }}/.browserstack-local"
        mkdir -p "${bs_dir}"
        curl -fsSL "${archive_url}" -o "${bs_dir}/BrowserStackLocal.zip"
        unzip -qo "${bs_dir}/BrowserStackLocal.zip" -d "${bs_dir}"
        chmod +x "${bs_dir}/BrowserStackLocal"

        local_identifier="${{ inputs.browserstack_local_identifier }}"
        if [ "${local_identifier}" = "random" ]; then
          local_identifier="GitHubAction-$(date +%s)-$RANDOM"
        fi

        echo "BROWSERSTACK_LOCAL=true" >> "$GITHUB_ENV"
        echo "BROWSERSTACK_LOCAL_IDENTIFIER=${local_identifier}" >> "$GITHUB_ENV"
        echo "BROWSERSTACK_LOCAL_TUNNEL_NAME=${{ inputs.browserstack_local_tunnel_name }}" >> "$GITHUB_ENV"

        start_log="${bs_dir}/browserstack-start.log"
        status_log="${bs_dir}/browserstack-status.log"

        "${bs_dir}/BrowserStackLocal" \
          --key "${{ inputs.browserstack_access_key }}" \
          --only-automate \
          --ci-plugin GitHubAction \
          --local-identifier "${local_identifier}" \
          --daemon start >"${start_log}" 2>&1

        connected="false"
        for _ in $(seq 1 30); do
          if "${bs_dir}/BrowserStackLocal" \
            --key "${{ inputs.browserstack_access_key }}" \
            --local-identifier "${local_identifier}" \
            --daemon status >"${status_log}" 2>&1; then
            if grep -Eiq "connected|running|success|you can now access your local server" "${status_log}"; then
              connected="true"
              break
            fi
          fi
          sleep 2
        done

        if [ "${connected}" != "true" ]; then
          echo "BrowserStackLocal failed to become ready."
          echo "--- BrowserStackLocal start output ---"
          cat "${start_log}" || true
          echo "--- BrowserStackLocal status output ---"
          cat "${status_log}" || true
          exit 1
        fi

    - name: Run Integrations
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        docker compose -f docker/docker-compose-integrations.yaml --profile ci up -d --force-recreate
        docker exec -t vault-e2e sh /tmp/init_vault.sh

    - name: Run Selenium Grid Browsers
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: docker compose -f docker/docker-compose-selenium-grid.yaml --profile ci up -d --force-recreate

    - name: Run Mega Test App
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: docker compose -f docker/docker-compose-mega-test-app.yaml --profile ci up -d --build --force-recreate
