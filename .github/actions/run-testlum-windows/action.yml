name: Run Testlum Regression Windows
description: Runs tests from DEMO repository using Testlum docker image on Windows runners.

inputs:
  image_tag:
    description: Testlum image tag to execute.
    required: true
  config_file:
    description: Config file passed to Testlum.
    required: true
  resources_path:
    description: Path to the mounted regression resources directory.
    required: false
    default: testlum-tests/REGRESSION

  sendgrid_api_key:
    description: SendGrid API key.
    required: false
    default: ""

  smtp_username:
    description: SMTP username.
    required: false
    default: ""

  smtp_password:
    description: SMTP password.
    required: false
    default: ""

  twilio_account_sid:
    description: Twilio account SID.
    required: false
    default: ""

  twilio_auth_token:
    description: Twilio auth token.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Launch Tests
      shell: pwsh
      run: |
        $ErrorActionPreference = "Continue"

        $containerRoot = "C:\REGRESSION"
        $resourcesDir = "C:\REGRESSION\resources"
        $mountDir = (Resolve-Path (Join-Path "${{ github.workspace }}" "${{ inputs.resources_path }}")).Path
        $image = "ghcr.io/testlumframework/testlum:${{ inputs.image_tag }}"

        Write-Host "Running Testlum image: $image"
        Write-Host "Using config: ${{ inputs.config_file }}"
        Write-Host "Using resources: $mountDir"

        docker run -t --rm `
          --network=e2e_network `
          --mount "type=bind,source=$mountDir,target=$containerRoot" `
          -e SENDGRID_API_KEY="${{ inputs.sendgrid_api_key }}" `
          -e SMTP_USERNAME="${{ inputs.smtp_username }}" `
          -e SMTP_PASSWORD="${{ inputs.smtp_password }}" `
          -e TWILIO_ACCOUNT_SID="${{ inputs.twilio_account_sid }}" `
          -e TWILIO_AUTH_TOKEN="${{ inputs.twilio_auth_token }}" `
          "$image" -c="${{ inputs.config_file }}" -p="$resourcesDir"
        $exitCode = $LASTEXITCODE

        Write-Host "Regression finished with exit code $exitCode"

        switch ($exitCode) {
          0 {
            Write-Host "BUILD STATUS [SUCCESS]"
            exit 0
          }
          1 {
            Write-Host "BUILD STATUS [FAILURE] - Tests failed"
            exit 1
          }
          2 {
            Write-Host "BUILD STATUS [FAILURE] - No tests found"
            exit 1
          }
          default {
            Write-Host "BUILD STATUS [FAILURE] - Invalid configuration or crash (Code: $exitCode)"
            exit 1
          }
        }
